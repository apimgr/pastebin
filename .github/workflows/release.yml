name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  ensure-build-image:
    name: Ensure :build image exists
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Log in to GHCR
        uses: docker/login-action@946f94de75ea52995b6aa1e54fd3e0aeed6cc573 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve :build image ref
        id: image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:build"
          docker pull "$IMAGE" 2>/dev/null || \
            docker build -f docker/Dockerfile.build -t "$IMAGE" .
          echo "ref=$IMAGE" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build release binaries
    needs: ensure-build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Log in to GHCR
        uses: docker/login-action@946f94de75ea52995b6aa1e54fd3e0aeed6cc573 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release binaries (all platforms)
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT_ID: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          mkdir -p binaries releases
          LDFLAGS="-s -w -X 'main.Version=${VERSION}' -X 'main.CommitID=${COMMIT_ID}' -X 'main.BuildDate=${BUILD_DATE}'"
          for PLATFORM in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 freebsd/amd64 freebsd/arm64; do
            OS="${PLATFORM%/*}"
            ARCH="${PLATFORM#*/}"
            OUTPUT="binaries/pastebin-${OS}-${ARCH}"
            CLI_OUTPUT="binaries/pastebin-cli-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe" && CLI_OUTPUT="${CLI_OUTPUT}.exe"
            echo "Building server ${OS}/${ARCH}..."
            docker run --rm \
              --entrypoint="" \
              -v "$PWD:/app" \
              -w /app \
              -e CGO_ENABLED=0 \
              -e GOOS="${OS}" \
              -e GOARCH="${ARCH}" \
              ${{ needs.ensure-build-image.outputs.image }} \
              go build -ldflags "$LDFLAGS" -o "${OUTPUT}" ./src
            echo "Building cli ${OS}/${ARCH}..."
            docker run --rm \
              --entrypoint="" \
              -v "$PWD:/app" \
              -w /app \
              -e CGO_ENABLED=0 \
              -e GOOS="${OS}" \
              -e GOARCH="${ARCH}" \
              ${{ needs.ensure-build-image.outputs.image }} \
              go build -ldflags "$LDFLAGS" -o "${CLI_OUTPUT}" ./src/client
          done
          cp binaries/* releases/

      - name: Package source
        run: |
          VERSION="${{ github.ref_name }}"
          tar --exclude='.git' --exclude='.github' --exclude='.gitea' \
              --exclude='binaries' --exclude='releases' --exclude='*.tar.gz' \
              -czf "releases/pastebin-${VERSION}-source.tar.gz" .

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: release-artifacts
          path: releases/
          retention-days: 1

  docker-release:
    name: Build and push Docker image
    needs: ensure-build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@259a565a6f30a57c28f9ea913f2d359b43ff5fc9 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@22b48a429f10e1de233237b5c534c9c3d2e41597 # v3

      - name: Log in to GHCR
        uses: docker/login-action@946f94de75ea52995b6aa1e54fd3e0aeed6cc573 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@f72b3cf665d7d5fe435407befecb40d10b4266d2 # v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT_ID=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          annotations: |
            org.opencontainers.image.title=pastebin
            org.opencontainers.image.description=Self-hosted pastebin service
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

  github-release:
    name: Publish GitHub release
    needs: [build-release, docker-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: release-artifacts
          path: releases/

      - name: Create GitHub release
        uses: softprops/action-gh-release@9ed3cf9a6863b31f005d951c8d19de20628cf4eb # v2
        with:
          files: releases/*
          generate_release_notes: true
          make_latest: true
