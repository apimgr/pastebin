name: Build Toolchain Image

on:
  push:
    paths:
      - "docker/Dockerfile.build"
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-toolchain:
    name: Build and push :build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@259a565a6f30a57c28f9ea913f2d359b43ff5fc9 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@22b48a429f10e1de233237b5c534c9c3d2e41597 # v3

      - name: Log in to GHCR
        uses: docker/login-action@946f94de75ea52995b6aa1e54fd3e0aeed6cc573 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :build image
        uses: docker/build-push-action@f72b3cf665d7d5fe435407befecb40d10b4266d2 # v6
        with:
          context: .
          file: docker/Dockerfile.build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:build
          annotations: |
            org.opencontainers.image.title=pastebin build toolchain
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
