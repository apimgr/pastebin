name: Security

on:
  push:
    branches:
      - main
      - master
      - beta
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run truffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab  # v3.95.3

  vuln-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        env:
          CGO_ENABLED: 0
        run: govulncheck ./...

  workflow-audit:
    name: Workflow hardening audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check all workflow actions are SHA-pinned
        run: |
          FAIL=0
          for f in .github/workflows/*.yml; do
            # Find any uses: that has a tag (@v...) instead of a full SHA
            if grep -E '^\s+uses: .+@v[0-9]' "$f"; then
              echo "ERROR: $f contains tag-pinned actions (must use full commit SHA)"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "All third-party actions must be pinned to a full commit SHA."
            exit 1
          fi
          echo "✓ All actions are SHA-pinned"

      - name: Check no hardcoded secrets in workflows
        run: |
          # Flag any credential assignment whose value is not a GitHub Actions
          # expression, a comment, or empty/whitespace-only.
          if grep -rE '(password|secret|token|api_key)\s*[:=]\s*\S' .github/workflows/ 2>/dev/null \
               | grep -v '#' \
               | grep -v '[$]{{'; then
            echo "ERROR: possible hardcoded credential found in workflow"
            exit 1
          fi
          echo "✓ No hardcoded credentials detected"
