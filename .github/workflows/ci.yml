name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Trust workspace for VCS tools
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: go vet ./...
      - run: staticcheck ./...

  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: go test -cover -coverprofile=/tmp/coverage.out ./...
      - name: Enforce coverage threshold
        run: |
          THRESHOLD=60
          PCT=$(go tool cover -func=/tmp/coverage.out | awk '/^total:/ {gsub("%","",$3); print int($3)}')
          if [ "$PCT" -lt "$THRESHOLD" ]; then
            echo "::error::coverage $PCT% < threshold $THRESHOLD%"
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: /tmp/coverage.out
          retention-days: 7

  build:
    needs: [lint, test]
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Trust workspace for VCS tools
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: go build ./...

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Run truffleHog
        uses: trufflesecurity/trufflehog@d03d0879a3d03548a000f6eb2640307f0815c3b3  # v3
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

  workflow-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check all actions are pinned to SHA
        run: |
          set -euo pipefail
          FAIL=0
          for f in .github/workflows/*.yml; do
            grep -nE 'uses: [^@]+@[^#]+$' "$f" | grep -vE '@[0-9a-f]{40}' && FAIL=1 || true
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "ERROR: One or more workflow steps use mutable action refs. Pin to full 40-char SHA."
            exit 1
          fi
          echo "All actions pinned to full SHA."

  vuln-check:
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Trust workspace for VCS tools
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: govulncheck ./...
