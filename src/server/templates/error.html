<!DOCTYPE html>
<html lang="{{.Lang}}" dir="{{.Dir}}" class="theme-{{.Theme}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.StatusCode}} {{.StatusText}} - {{.SiteTitle}}</title>
    <meta name="theme-color" content="#89b4fa">
    <link rel="manifest" href="{{.AssetPrefix}}/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{.SiteTitle}}">
    <link rel="apple-touch-icon" href="{{.AssetPrefix}}/static/icons/icon-180.png">
    <link rel="stylesheet" href="{{.AssetPrefix}}/static/css/main.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="header">
        <nav class="nav">
            <a href="{{.BaseURL}}/" class="nav-brand">
                <div class="nav-brand-icon">📋</div>
                <span>{{.SiteTitle}}</span>
            </a>
            <div class="nav-links">
                <a href="{{.BaseURL}}/" class="nav-link">{{t .Lang "nav.home"}}</a>
                <a href="{{.BaseURL}}/create" class="nav-link">{{t .Lang "nav.create"}}</a>
                <a href="{{.BaseURL}}/recent" class="nav-link">{{t .Lang "nav.recent"}}</a>
                <form class="theme-toggle" method="post" action="{{.BaseURL}}/theme"><input type="hidden" name="csrf_token" value="{{.CSRFToken}}"><input type="hidden" name="theme" value="{{.NextTheme}}"><button type="submit" class="theme-button" data-theme-toggle aria-label="Toggle theme">🌙</button></form>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <div class="error-page">
            <h1 class="error-code">{{.StatusCode}}</h1>
            <h2 class="error-title">{{.StatusText}}</h2>
            <p class="error-message">{{.Message}}</p>
            <div class="error-actions">
                <a href="{{.BaseURL}}/" class="btn btn-primary">{{t .Lang "nav.home"}}</a>
                <a href="{{.BaseURL}}/server/help" class="btn">{{t .Lang "footer.help"}}</a>
            </div>
        </div>
    </main>

    {{template "footer" .}}

    <div id="toast-container"></div>

    <script>window.PB_I18N = {{i18njs .Lang}};</script>
    <script src="{{.AssetPrefix}}/static/js/main.js"></script>
</body>
</html>
