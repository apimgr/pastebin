<!DOCTYPE html>
<html lang="{{.Lang}}" dir="{{.Dir}}" data-theme="{{.Theme}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - {{.SiteTitle}}</title>
    <meta name="description" content="Scan the QR code to open this paste on another device">
    <meta name="theme-color" content="#89b4fa">
    <link rel="manifest" href="{{.AssetPrefix}}/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{.SiteTitle}}">
    <link rel="apple-touch-icon" href="{{.AssetPrefix}}/static/icons/icon-180.png">
    <link rel="stylesheet" href="{{.AssetPrefix}}/static/css/main.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="header">
        <nav class="nav">
            <a href="{{.BaseURL}}/" class="nav-brand">
                <div class="nav-brand-icon">📋</div>
                <span>{{.SiteTitle}}</span>
            </a>
            <div class="nav-links">
                <a href="{{.BaseURL}}/" class="nav-link">{{t .Lang "nav.home"}}</a>
                <a href="{{.BaseURL}}/create" class="nav-link">{{t .Lang "nav.create"}}</a>
                <a href="{{.BaseURL}}/recent" class="nav-link">{{t .Lang "nav.recent"}}</a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <section class="search-section">
            <div class="container container-sm page-centered">
                <div class="section-header">
                    <h1 class="section-title">{{t .Lang "qr.title"}}</h1>
                    <p class="section-description">Scan to open paste <code>{{.ID}}</code></p>
                </div>

                <div class="paste-view qr-container">
                    <img
                        class="qr-image"
                        src="{{.AssetPrefix}}/qr/{{.ID}}/image"
                        alt="QR code for {{.Link}}"
                        width="300"
                        height="300"
                    >
                    <p class="qr-link-text">{{.Link}}</p>
                    <div class="form-actions qr-actions">
                        <a href="{{.BaseURL}}/{{.ID}}" class="btn btn-primary">{{t .Lang "qr.view_paste"}}</a>
                        <button
                            class="btn btn-secondary"
                            data-qr-download="/qr/{{.ID}}/image"
                            data-qr-name="paste-{{.ID}}-qr.png"
                        >{{t .Lang "qr.download_qr"}}</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    {{template "footer" .}}

    <div id="offline-indicator" hidden>{{t .Lang "offline"}}</div>
    <div id="toast-container"></div>

    <script>window.PB_I18N = {{i18njs .Lang}};</script>
    <script src="{{.AssetPrefix}}/static/js/main.js"></script>
</body>
</html>
