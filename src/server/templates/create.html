<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Paste - {{.SiteTitle}}</title>
    <meta name="description" content="Create a new paste with syntax highlighting">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav">
            <a href="/" class="nav-brand">
                <div class="nav-brand-icon">📋</div>
                <span>{{.SiteTitle}}</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/create" class="nav-link active">Create</a>
                <a href="/recent" class="nav-link">Recent</a>
                <a href="/api" class="nav-link">API</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="search-section">
            <div class="container container-sm">
                <div class="section-header">
                    <h1 class="section-title">Create New Paste</h1>
                    <p class="section-description">Share code or text with syntax highlighting</p>
                </div>

                <form id="paste-form" class="paste-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title" class="form-label">Title (optional)</label>
                            <input
                                type="text"
                                id="title"
                                name="title"
                                class="form-input"
                                placeholder="Untitled"
                            >
                        </div>
                        <div class="form-group">
                            <label for="language" class="form-label">Language</label>
                            <select id="language" name="language" class="form-input">
                                <option value="text">Plain Text</option>
                                <option value="javascript">JavaScript</option>
                                <option value="typescript">TypeScript</option>
                                <option value="python">Python</option>
                                <option value="go">Go</option>
                                <option value="rust">Rust</option>
                                <option value="java">Java</option>
                                <option value="c">C</option>
                                <option value="cpp">C++</option>
                                <option value="csharp">C#</option>
                                <option value="php">PHP</option>
                                <option value="ruby">Ruby</option>
                                <option value="swift">Swift</option>
                                <option value="kotlin">Kotlin</option>
                                <option value="html">HTML</option>
                                <option value="css">CSS</option>
                                <option value="json">JSON</option>
                                <option value="yaml">YAML</option>
                                <option value="xml">XML</option>
                                <option value="sql">SQL</option>
                                <option value="bash">Bash</option>
                                <option value="powershell">PowerShell</option>
                                <option value="markdown">Markdown</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="expires" class="form-label">Expires</label>
                            <select id="expires" name="expires_in" class="form-input">
                                <option value="never">Never</option>
                                <option value="1h">1 Hour</option>
                                <option value="1d">1 Day</option>
                                <option value="1w">1 Week</option>
                                <option value="1m">1 Month</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="content" class="form-label">Content</label>
                        <textarea
                            id="content"
                            name="content"
                            class="form-input"
                            rows="20"
                            placeholder="Paste your code or text here..."
                            required
                        ></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <span class="btn-icon">📝</span>
                            Create Paste
                        </button>
                    </div>
                </form>

                <div id="result" class="result hidden"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="footer-logo">📋</div>
                <span class="footer-text">{{.SiteTitle}} - Part of apimgr</span>
            </div>
            <div class="footer-links">
                <a href="/api" class="footer-link">API Docs</a>
                <a href="/healthz" class="footer-link">Status</a>
                <a href="https://github.com/apimgr" class="footer-link">GitHub</a>
            </div>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    <script>
        document.getElementById('paste-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const content = document.getElementById('content').value;
            const title = document.getElementById('title').value;
            const language = document.getElementById('language').value;
            const expiresIn = document.getElementById('expires').value;

            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>Creating paste...</p></div>';

            try {
                const response = await fetch('/api/v1/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        content,
                        title: title || 'Untitled',
                        language,
                        expires_in: expiresIn
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>Paste Created!</h3>
                            <p>View: <a href="${data.link}" target="_blank">${data.link}</a></p>
                            <p>Raw: <a href="/raw/${data.id}" target="_blank">/raw/${data.id}</a></p>
                            <p>Download: <a href="/download/${data.id}" target="_blank">/download/${data.id}</a></p>
                            <div class="form-actions" style="margin-top: var(--space-4);">
                                <button onclick="navigator.clipboard.writeText('${data.link}')" class="btn btn-secondary">
                                    Copy Link
                                </button>
                                <a href="${data.link}" class="btn btn-primary">
                                    View Paste
                                </a>
                            </div>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">Error: ${data.error || 'Unknown error'}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        });

        // Tab key support in textarea
        document.getElementById('content').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });

        // Focus textarea on page load
        document.getElementById('content').focus();
    </script>
</body>
</html>
