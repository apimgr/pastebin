# pastebin - test compose
# ✅ FOR AI AND AUTOMATED TESTING — ONLY docker-compose file AI may use.
# MUST be copied to a temp directory before running — NEVER run from project directory.
#
# Workflow:
#   mkdir -p "${TMPDIR:-/tmp}/apimgr"
#   TEMP_DIR=$(mktemp -d "${TMPDIR:-/tmp}/apimgr/pastebin-XXXXXX")
#   mkdir -p "$TEMP_DIR/volumes/config" "$TEMP_DIR/volumes/data"
#   cp docker/docker-compose.test.yml "$TEMP_DIR/docker-compose.yml"
#   cd "$TEMP_DIR" && docker compose up --abort-on-container-exit
#   rm -rf "$TEMP_DIR"

name: pastebin-test

services:
  pastebin:
    image: ghcr.io/apimgr/pastebin:latest
    pull_policy: always
    container_name: pastebin-test
    restart: "no"
    environment:
      - MODE=development
      - DEBUG=true
      - TZ=America/New_York
      - TERMBIN_ENABLED=true
    ports:
      - "64581:80"
      - "64599:9999"
    volumes:
      # CRITICAL: ./volumes/ must resolve to $TEMP_DIR/volumes/, NOT project directory
      # This file MUST be copied to a temp directory before running
      - ./volumes/config:/config:z
      - ./volumes/data:/data:z
    networks:
      - pastebin-test

networks:
  pastebin-test:
    name: pastebin-test
    external: false
