# pastebin - development compose
# ⚠️ FOR HUMAN USE ONLY — AI must never use this file directly.
# Use temp dir workflow: cp docker/docker-compose.dev.yml $TEMP_DIR/docker-compose.yml

name: pastebin

x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  pastebin:
    image: ghcr.io/apimgr/pastebin:devel
    pull_policy: always
    container_name: pastebin-app
    hostname: ${BASE_HOST_NAME:-pastebin}
    restart: always
    logging: *default-logging
    environment:
      - MODE=development
      - PORT=80
      - DEBUG=true
      - TZ=${TZ:-America/New_York}
    ports:
      # Development: accessible from all interfaces
      - "64580:80"
    volumes:
      # TEMP DIR WORKFLOW: ./volumes/ resolves to $TEMP_DIR/volumes/
      # NEVER run from project directory — always use temp dir workflow
      - ./volumes/config:/config:z
      - ./volumes/data:/data:z
    networks:
      - pastebin

networks:
  pastebin:
    name: pastebin
    external: false
