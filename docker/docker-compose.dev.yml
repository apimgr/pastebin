# pastebin - development compose
# ⚠️ FOR HUMAN USE ONLY — AI must never use this file directly.
# Use temp dir workflow: cp docker/docker-compose.dev.yml $TEMP_DIR/docker-compose.yml

name: pastebin-dev

x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  pastebin:
    image: ghcr.io/apimgr/pastebin:latest
    pull_policy: always
    container_name: pastebin-dev
    restart: always
    logging: *default-logging
    environment:
      # Development: relaxed security, verbose logging, no caching
      - MODE=development
      - TZ=America/New_York
      # Uncomment to enable debug endpoints (pprof, expvar, detailed logging)
      # - DEBUG=true
    ports:
      # Development: accessible from all interfaces
      - "64580:80"
    volumes:
      # TEMP DIR WORKFLOW: ./volumes/ resolves to $TEMP_DIR/volumes/
      # NEVER run from project directory — always use temp dir workflow
      - ./volumes/config:/config:z
      - ./volumes/data:/data:z
    networks:
      - pastebin-dev

networks:
  pastebin-dev:
    name: pastebin-dev
    external: false
