name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  packages: read

jobs:
  ensure-build-image:
    name: Ensure :build image exists
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Log in to GHCR
        uses: docker/login-action@946f94de75ea52995b6aa1e54fd3e0aeed6cc573 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve :build image ref
        id: image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:build"
          docker pull "$IMAGE" 2>/dev/null || \
            docker build -f docker/Dockerfile.build -t "$IMAGE" .
          echo "ref=$IMAGE" >> "$GITHUB_OUTPUT"

  test:
    name: Unit tests
    needs: ensure-build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Log in to GHCR
        uses: docker/login-action@946f94de75ea52995b6aa1e54fd3e0aeed6cc573 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: |
          docker run --rm \
            --entrypoint="" \
            -v "$PWD:/app" \
            -w /app \
            -e CGO_ENABLED=0 \
            ${{ needs.ensure-build-image.outputs.image }} \
            go test -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          docker run --rm \
            --entrypoint="" \
            -v "$PWD:/app" \
            -w /app \
            -e CGO_ENABLED=0 \
            ${{ needs.ensure-build-image.outputs.image }} \
            sh -c "
              COVERAGE=\$(go tool cover -func=coverage.out | grep total | awk '{print \$3}' | sed 's/%//')
              echo \"Coverage: \${COVERAGE}%\"
              if [ \"\$(echo \"\$COVERAGE < 60\" | bc -l)\" -eq 1 ]; then
                echo 'ERROR: Coverage below 60%'
                exit 1
              fi
            "

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: Build all platforms
    needs: [ensure-build-image, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Log in to GHCR
        uses: docker/login-action@946f94de75ea52995b6aa1e54fd3e0aeed6cc573 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        env:
          VERSION: ${{ github.sha }}
          COMMIT_ID: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          mkdir -p binaries
          LDFLAGS="-s -w -X 'main.Version=${VERSION}' -X 'main.CommitID=${COMMIT_ID}' -X 'main.BuildDate=${BUILD_DATE}'"
          for PLATFORM in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 freebsd/amd64 freebsd/arm64; do
            OS="${PLATFORM%/*}"
            ARCH="${PLATFORM#*/}"
            OUTPUT="binaries/pastebin-${OS}-${ARCH}"
            CLI_OUTPUT="binaries/pastebin-cli-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe" && CLI_OUTPUT="${CLI_OUTPUT}.exe"
            echo "Building server ${OS}/${ARCH}..."
            docker run --rm \
              --entrypoint="" \
              -v "$PWD:/app" \
              -w /app \
              -e CGO_ENABLED=0 \
              -e GOOS="${OS}" \
              -e GOARCH="${ARCH}" \
              ${{ needs.ensure-build-image.outputs.image }} \
              go build -ldflags "$LDFLAGS" -o "${OUTPUT}" ./src
            echo "Building cli ${OS}/${ARCH}..."
            docker run --rm \
              --entrypoint="" \
              -v "$PWD:/app" \
              -w /app \
              -e CGO_ENABLED=0 \
              -e GOOS="${OS}" \
              -e GOARCH="${ARCH}" \
              ${{ needs.ensure-build-image.outputs.image }} \
              go build -ldflags "$LDFLAGS" -o "${CLI_OUTPUT}" ./src/client
          done

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: binaries
          path: binaries/
          retention-days: 7

  lint:
    name: Static analysis (staticcheck)
    needs: ensure-build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Log in to GHCR
        uses: docker/login-action@946f94de75ea52995b6aa1e54fd3e0aeed6cc573 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run staticcheck
        run: |
          docker run --rm \
            --entrypoint="" \
            -v "$PWD:/app" \
            -w /app \
            -e CGO_ENABLED=0 \
            ${{ needs.ensure-build-image.outputs.image }} \
            staticcheck ./...
