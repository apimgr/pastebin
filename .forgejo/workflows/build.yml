name: Build

on:
  push:
    branches:
      - main
      - master
      - devel
      - dev
      - beta
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: build-${{ forgejo.ref }}
  cancel-in-progress: ${{ forgejo.ref == 'refs/heads/main' || forgejo.ref == 'refs/heads/master' || forgejo.ref == 'refs/heads/devel' || forgejo.ref == 'refs/heads/dev' || forgejo.ref == 'refs/heads/beta' }}

permissions:
  contents: read

env:
  PROJECTNAME: pastebin

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - uses: actions/checkout@v6

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run go vet
        env:
          CGO_ENABLED: 0
        run: go vet ./...

      - name: Run staticcheck
        env:
          CGO_ENABLED: 0
        run: staticcheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        env:
          CGO_ENABLED: 0
        run: go test -v -timeout 5m -cover -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    container: golang:alpine
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set build info
        run: |
          if [ -f release.txt ]; then
            echo "VERSION=$(cat release.txt)" >> $FORGEJO_ENV
          else
            echo "VERSION=$(git rev-parse --short HEAD)" >> $FORGEJO_ENV
          fi
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $FORGEJO_ENV
          echo "BUILD_DATE=$(date +"%a %b %d, %Y at %H:%M:%S %Z")" >> $FORGEJO_ENV
          if [ -f site.txt ]; then
            echo "OFFICIALSITE=$(cat site.txt)" >> $FORGEJO_ENV
          else
            echo "OFFICIALSITE=${{ secrets.OFFICIALSITE }}" >> $FORGEJO_ENV
          fi

      - name: Build server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          LDFLAGS="-s -w -X 'main.Version=${{ env.VERSION }}' -X 'main.CommitID=${{ env.COMMIT_ID }}' -X 'main.BuildDate=${{ env.BUILD_DATE }}' -X 'main.OfficialSite=${{ env.OFFICIALSITE }}'"
          go build -ldflags "${LDFLAGS}" -o ${{ env.PROJECTNAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./src

      - name: Upload server artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.PROJECTNAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.PROJECTNAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
