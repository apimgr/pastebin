name: Security

on:
  push:
    branches:
      - main
      - master
      - beta
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC
  workflow_dispatch:

concurrency:
  group: security-${{ forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run truffleHog
        uses: trufflesecurity/trufflehog@v3

  vuln-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - uses: actions/checkout@v6

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        env:
          CGO_ENABLED: 0
        run: govulncheck ./...

  workflow-audit:
    name: Workflow hardening audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check no hardcoded secrets in workflows
        run: |
          if grep -rE '(password|secret|token|api_key)\s*[:=]\s*\S' .forgejo/workflows/ 2>/dev/null \
               | grep -v '#' \
               | grep -v '[$]{{'; then
            echo "ERROR: possible hardcoded credential found in workflow"
            exit 1
          fi
          echo "All workflows: no hardcoded credentials detected"
